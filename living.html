        .switch {
  position: relative;
  display: inline-block;
  width: 40px;
  height: 20px;
  margin: 5px 0;
}

.switch input { 
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  -webkit-transition: .4s;
  transition: .4s;
}
.slider:before {
  position: absolute;
  content: "";
  height: 15px;
  width: 15px;
  left: 2px;
  bottom: 2.5px;
  background-color: white;
  -webkit-transition: .4s;
  transition: .4s;
}

input:checked + .slider {
  background-color: #3ddc00;
}

input:focus + .slider {
  box-shadow: 0 0 1px #3ddc00;
}

input:checked + .slider:before {
  -webkit-transform: translateX(20px);
  -ms-transform: translateX(20px);
  transform: translateX(20px);
}

/* Rounded sliders */
.slider.round {
  border-radius: 34px;
}

.slider.round:before {
  border-radius: 50%;
}

        const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function dateTime(dateSpan){

    let dateNum = date.getDate();
    let month = months[date.getMonth()];
    dateSpan.innerHTML = `${dayOfWeek}, ${dateNum} ${month}.`
    date.getDay();
}
